<!DOCTYPE html>
<html>

<head>
  <title>Simple Interest Calculator | DevByte Tools</title>
  <meta name="description" content="Calculate simple interest for loans or deposits instantly.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Simple Interest Calculator</h1>
  <p>Enter principal, rate, and time to calculate interest</p>
</header>

<div class="calculator-container">
  <div class="calculator-card">
    <input type="number" id="principal" placeholder="Principal Amount" />
    <input type="number" id="rate" placeholder="Interest Rate (%)" />
    <input type="number" id="time" placeholder="Time (years)" />
    <button onclick="calculateInterest()">Calculate</button>
    <p id="interestresult"></p>
  </div>
</div>

<a class="back-home" href="index.html">← Back to Home</a>

<script src="script.js"></script>

</body>
</html>
