<!DOCTYPE html>
<html>

<head>
  <title>Loan EMI Calculator | DevByte Tools</title>
  <meta name="description" content="Calculate monthly EMI for any loan.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Loan EMI Calculator</h1>
  <p>Enter loan amount, interest rate, and tenure to calculate EMI</p>
</header>

<div class="calculator-container">
  <div class="calculator-card">
    <input type="number" id="loanamount" placeholder="Loan Amount" />
    <input type="number" id="interestrate" placeholder="Interest Rate (%)" />
    <input type="number" id="loanmonths" placeholder="Loan Tenure (months)" />
    <button onclick="calculateEMI()">Calculate</button>
    <p id="emiresult"></p>
  </div>
</div>

<a class="back-home" href="index.html">← Back to Home</a>

<script src="script.js"></script>

</html>
